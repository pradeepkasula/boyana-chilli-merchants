spring:
  datasource:
    url: jdbc:mysql://localhost:3306/chilli_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    show-sql: true

logging:
  level:
    com.chilli.app: DEBUG
    org.flywaydb: INFO
