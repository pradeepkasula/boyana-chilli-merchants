spring:
  profiles:
    active: dev
  application:
    name: chilli-backend
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

app:
  jwt:
    secret: ${JWT_SECRET:chilli-enterprises-super-secret-key-change-in-production-2024}
    expiration-ms: 28800000  # 8 hours

server:
  port: 8080
  servlet:
    context-path: /

logging:
  level:
    com.chilli.app: INFO
    org.springframework.security: WARN
